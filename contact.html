<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式 - 天道元一</title>
    <style>
        :root { --gold: #FFD700; --dark: #0a0a0f; --text: #f0f0f0; --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", serif; background: var(--dark); color: var(--text); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; border-bottom: 2px solid var(--gold); }
        .back { color: var(--gold); text-decoration: none; display: block; margin-bottom: 20px; }
        h1 { color: var(--gold); font-size: 2rem; }
        .content { padding: 40px 0; }
        .contact-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.3); border-radius: 15px; padding: 30px; margin: 20px 0; text-align: center; }
        .contact-card h2 { color: var(--gold); margin-bottom: 15px; }
        .contact-card p { color: var(--muted); font-size: 1.2rem; }
        .big-number { font-size: 2.5rem; color: var(--gold); font-weight: bold; margin: 15px 0; }
        footer { text-align: center; padding: 40px 0; border-top: 1px solid rgba(255,215,0,0.2); color: var(--muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back">← 返回首页</a>
            <h1>联系我们</h1>
        </header>
        
        <div class="content">
            <div class="contact-card">
                <h2>📞 客服电话</h2>
                <p class="big-number">180-5812-5388</p>
                <p>工作时间：9:00-21:00</p>
            </div>
            
            <div class="contact-card">
                <h2>💬 微信客服</h2>
                <p class="big-number">80506070</p>
                <p>扫码添加，随时咨询</p>
            </div>
            
            <div class="contact-card">
                <h2>📍 公司地址</h2>
                <p style="font-size: 1.1rem; line-height: 2;">杭州天道元一科技有限公司<br>
                杭州市萧山区市心北路108号<br>
                雷迪森财富中心3008</p>
            </div>
        </div>
        
        <footer>
            <p>© 2025 天道元一科技有限公司</p>
        </footer>
    </div>
</body>
</html>
